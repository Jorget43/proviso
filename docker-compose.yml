services:
  proviso:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pass the git tag at build time so the in-app update banner can detect newer releases.
        # In CI: --build-arg PROVISO_VERSION=$(git describe --tags --abbrev=0)
        # Locally:  docker compose build (omit = "dev", banner never shown)
        PROVISO_VERSION: ${PROVISO_VERSION:-dev}
    container_name: proviso
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - proviso-db:/data
    environment:
      - DATABASE_URL=file:/data/proviso.db
      - NODE_ENV=production
      # Watchdog notification — set these to enable weekly email alerts (Jorge's instance only)
      # WATCHDOG_ENABLED=true activates the scheduler and the /admin/watchdog page
      # NOTIFICATION_EMAIL=you@gmail.com — where alerts are sent
      # RESEND_API_KEY=re_... — get a free key at resend.com (3k emails/month free)
      # RESEND_FROM_EMAIL=onboarding@resend.dev — use Resend's default sender for personal use
      #   (requires your NOTIFICATION_EMAIL to be verified in the Resend dashboard)
      #   or set to noreply@yourdomain.com after verifying a domain in Resend
      # - WATCHDOG_ENABLED=true
      # - NOTIFICATION_EMAIL=tsiposjorge@gmail.com
      # - RESEND_API_KEY=re_...
      # - RESEND_FROM_EMAIL=onboarding@resend.dev

  # ── Optional: Watchtower (Docker update notifications) ────────────────────
  # Polls GHCR daily and notifies via email when a new proviso image is available.
  # Remove the --monitor-only flag to enable auto-pull + restart instead.
  # Uncomment this block to activate.
  #
  # watchtower:
  #   image: containrrr/watchtower
  #   container_name: watchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 86400 --label-enable --monitor-only
  #   environment:
  #     - WATCHTOWER_NOTIFICATIONS=email
  #     - WATCHTOWER_NOTIFICATION_EMAIL_TO=${NOTIFICATION_EMAIL}
  #     - WATCHTOWER_NOTIFICATION_EMAIL_FROM=watchtower@proviso
  #     - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=smtp.gmail.com
  #     - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT=587
  #     - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_USER=${SMTP_USER}
  #     - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PASSWORD=${SMTP_PASSWORD}
  # Add this label to the proviso service above to scope Watchtower to Proviso only:
  #   labels:
  #     - "com.centurylinklabs.watchtower.enable=true"

volumes:
  proviso-db:
    driver: local
