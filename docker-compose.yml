services:
  proviso:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proviso
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - proviso-db:/data
    environment:
      - DATABASE_URL=file:/data/proviso.db
      - NODE_ENV=production

volumes:
  proviso-db:
    driver: local
